<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Échos — Parler à ceux qui sont partis</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: rgba(255,255,255,0.07);
    --gold: #c9a96e;
    --gold-dim: rgba(201,169,110,0.15);
    --gold-glow: rgba(201,169,110,0.05);
    --text: #e8e0d0;
    --text-dim: rgba(232,224,208,0.45);
    --user-bubble: rgba(201,169,110,0.08);
    --soul-bubble: rgba(255,255,255,0.03);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── Starfield ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,169,110,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 80% 100%, rgba(100,80,160,0.05) 0%, transparent 60%);
  }
  #stars::before, #stars::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 60%, rgba(201,169,110,0.6) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 82% 10%, rgba(201,169,110,0.4) 0%, transparent 100%);
  }

  /* ── Layout ── */
  #app {
    position: relative; z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── SCREEN: Setup ── */
  #setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    animation: fadeIn 1.2s ease;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 6vw, 4rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-align: center;
    margin-bottom: 0.3rem;
  }
  .logo-sub {
    font-family: 'Lato', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 3rem;
  }

  .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 2.5rem;
  }

  .field-group {
    width: 100%;
    margin-bottom: 1.4rem;
  }
  label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.5rem;
  }
  input, textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.95rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.3s;
    resize: none;
  }
  input:focus, textarea:focus {
    border-color: rgba(201,169,110,0.4);
    background: rgba(201,169,110,0.03);
  }
  input::placeholder, textarea::placeholder { color: var(--text-dim); }

  .audio-upload-area {
    width: 100%;
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    background: var(--surface);
  }
  .audio-upload-area:hover { border-color: rgba(201,169,110,0.3); background: var(--gold-glow); }
  .audio-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
  .upload-label { font-size: 0.78rem; color: var(--text-dim); }
  .upload-label span { color: var(--gold); }
  #audio-file-name { font-size: 0.75rem; color: var(--gold); margin-top: 0.4rem; display: none; }

  /* ── Media upload (photo/video) ── */
  .media-upload-area {
    width: 100%;
    border: 1px dashed var(--border);
    border-radius: 2px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    background: var(--surface);
  }
  .media-upload-area:hover { border-color: rgba(201,169,110,0.3); background: var(--gold-glow); }
  .media-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  #media-file-name { font-size: 0.75rem; color: var(--gold); margin-top: 0.4rem; display: none; }
  .media-preview-thumb {
    width: 100%; max-height: 120px; object-fit: cover;
    border-radius: 2px; margin-top: 0.8rem; display: none;
    border: 1px solid var(--border);
  }

  .audio-preview {
    width: 100%;
    margin-top: 0.8rem;
    display: none;
  }
  .audio-preview audio {
    width: 100%;
    filter: invert(1) sepia(1) saturate(0.3) hue-rotate(10deg);
    border-radius: 2px;
  }

  .btn-begin {
    width: 100%;
    margin-top: 1rem;
    padding: 0.9rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Lato', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.35s;
    border-radius: 1px;
  }
  .btn-begin:hover { background: var(--gold-dim); }
  .btn-begin:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── Background media ── */
  #bg-media-container {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
    display: none;
  }
  #bg-media-container.visible { display: block; }
  #bg-photo {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.22) blur(2px) saturate(0.6);
  }
  #bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.18) blur(3px) saturate(0.5);
  }
  .bg-vignette {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 10%, rgba(10,10,15,0.85) 80%);
  }

  /* Portrait inset — visible dans le chat */
  #portrait-panel {
    display: none;
    position: absolute;
    bottom: 100px; right: 1.5rem;
    width: 110px;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    z-index: 10;
    pointer-events: none;
    animation: fadeIn 1s ease;
  }
  #portrait-panel.visible { display: flex; }
  #portrait-img {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid rgba(201,169,110,0.4);
    box-shadow: 0 0 30px rgba(201,169,110,0.12);
    filter: brightness(0.9) sepia(0.15);
  }
  #portrait-video {
    width: 110px; height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 1.5px solid rgba(201,169,110,0.4);
    box-shadow: 0 0 30px rgba(201,169,110,0.12);
    filter: brightness(0.85) sepia(0.2) saturate(0.8);
  }
  .portrait-name-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.78rem;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* ── SCREEN: Chat ── */
  #chat-screen {
    display: none;
    flex-direction: column;
    width: 100%;
    height: 100vh;
    max-width: 700px;
    margin: 0 auto;
    animation: fadeIn 0.8s ease;
    position: relative;
    z-index: 2;
  }

  .chat-header {
    padding: 1.2rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.6);
  }
  .soul-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--gold);
    background: radial-gradient(circle at 40% 40%, rgba(201,169,110,0.1), transparent);
    flex-shrink: 0;
    position: relative;
  }
  .soul-avatar::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.1);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0; }
  }
  .soul-info { flex: 1; }
  .soul-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .soul-status {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 1px;
  }
  .soul-status span { color: var(--gold); }

  .btn-reset {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 0.6rem;
    transition: color 0.2s;
  }
  .btn-reset:hover { color: var(--gold); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,169,110,0.2) transparent;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(201,169,110,0.2); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: msgIn 0.4s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.soul  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 0.75rem 1rem;
    border-radius: 2px;
    line-height: 1.65;
    font-size: 0.92rem;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(201,169,110,0.15);
    color: var(--text);
  }
  .msg.soul .bubble {
    background: var(--soul-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    font-weight: 300;
  }
  .msg-time {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-top: 0.3rem;
    padding: 0 0.2rem;
  }

  /* Typing indicator */
  .typing-dots {
    display: flex; gap: 5px; padding: 0.8rem 1rem;
    background: var(--soul-bubble);
    border: 1px solid var(--border);
    border-radius: 2px;
    width: fit-content;
    align-self: flex-start;
  }
  .typing-dots span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.5;
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ── Intro message ── */
  .intro-msg {
    text-align: center;
    padding: 1.5rem 1rem;
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 0.95rem;
    line-height: 1.7;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0.5rem;
  }
  .intro-msg strong { color: var(--gold); font-style: normal; font-weight: 400; }

  /* ── Input area ── */
  .chat-input-area {
    padding: 1rem 1.2rem 1.2rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.8rem;
    align-items: flex-end;
    flex-shrink: 0;
    backdrop-filter: blur(12px);
    background: rgba(10,10,15,0.6);
  }
  #chat-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.9rem;
    padding: 0.7rem 1rem;
    outline: none;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  #chat-input:focus { border-color: rgba(201,169,110,0.3); }
  #chat-input::placeholder { color: var(--text-dim); }

  .btn-send {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    width: 40px; height: 40px;
    border-radius: 2px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    flex-shrink: 0;
  }
  .btn-send:hover { background: var(--gold-dim); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-send svg { width: 16px; height: 16px; }

  /* ── Audio mini-player ── */
  .audio-bar {
    display: none;
    padding: 0.5rem 1.2rem;
    background: rgba(201,169,110,0.04);
    border-top: 1px solid var(--border);
    align-items: center;
    gap: 0.8rem;
    flex-shrink: 0;
  }
  .audio-bar.visible { display: flex; }
  .audio-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .audio-bar audio { flex: 1; height: 28px; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 480px) {
    .msg { max-width: 92%; }
    #setup-screen { padding: 1.5rem 1rem; }
  }
</style>
</head>
<body>
<div id="stars"></div>
<div id="app">

  <!-- ═══════════════ SETUP SCREEN ═══════════════ -->
  <div id="setup-screen">
    <div class="logo">Échos</div>
    <div class="logo-sub">Retrouver ceux qui sont partis</div>
    <div class="divider"></div>

    <div class="field-group">
      <label>Nom de la personne</label>
      <input type="text" id="person-name" placeholder="Ex : Grand-père Henri" maxlength="60">
    </div>

    <div class="field-group">
      <label>Qui était cette personne ?</label>
      <textarea id="person-bio" rows="4" placeholder="Décrivez qui il/elle était : sa personnalité, ses expressions, ses passions, ses habitudes, la façon dont il/elle vous parlait…"></textarea>
    </div>

    <div class="field-group">
      <label>Photo ou vidéo du défunt (optionnel)</label>
      <div class="media-upload-area">
        <input type="file" id="media-file" accept="image/*,video/*">
        <div class="upload-icon">🖼️</div>
        <div class="upload-label">Photo ou courte vidéo · <span>Parcourir</span></div>
        <div id="media-file-name"></div>
      </div>
      <img id="media-preview-img" class="media-preview-thumb" alt="aperçu">
      <video id="media-preview-vid" class="media-preview-thumb" muted playsinline loop></video>
    </div>

    <div class="field-group">
      <label>Voix / Enregistrement (optionnel)</label>
      <div class="audio-upload-area">
        <input type="file" id="audio-file" accept="audio/*">
        <div class="upload-icon">🎵</div>
        <div class="upload-label">Déposez un enregistrement audio · <span>Parcourir</span></div>
        <div id="audio-file-name"></div>
      </div>
      <div class="audio-preview" id="audio-preview">
        <audio id="audio-player" controls></audio>
      </div>
    </div>

    <div class="field-group" style="margin-top:0.5rem;">
      <label style="display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:0.82rem;color:rgba(237,231,217,0.6);line-height:1.5;">
        <input type="checkbox" id="consent1" onchange="validateSetup()" style="margin-top:3px;flex-shrink:0;accent-color:#c8a96d;">
        Je certifie être un proche autorisé à utiliser les données et photos de cette personne
      </label>
    </div>

    <div class="field-group" style="margin-top:0.5rem;">
      <label style="display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:0.82rem;color:rgba(237,231,217,0.6);line-height:1.5;">
        <input type="checkbox" id="consent2" onchange="validateSetup()" style="margin-top:3px;flex-shrink:0;accent-color:#c8a96d;">
        Je comprends que les réponses sont générées par une intelligence artificielle et non par la personne décédée
      </label>
    </div>

    <div class="field-group" style="margin-top:0.5rem;">
      <label style="display:flex;align-items:flex-start;gap:0.6rem;cursor:pointer;text-transform:none;letter-spacing:0;font-size:0.82rem;color:rgba(237,231,217,0.6);line-height:1.5;">
        <input type="checkbox" id="consent3" onchange="validateSetup()" style="margin-top:3px;flex-shrink:0;accent-color:#c8a96d;">
        J'accepte les <a href="#" onclick="ouvrirLegal();return false;" style="color:#c8a96d;">CGU et la Politique de Confidentialité</a>
      </label>
    </div>

    <button class="btn-begin" id="btn-begin" disabled onclick="beginChat()" style="position:sticky;bottom:1rem;margin-top:1rem;">
      Ouvrir la connexion
    </button>
  </div>

  <!-- ═══════════════ BG MEDIA ═══════════════ -->
  <div id="bg-media-container">
    <img id="bg-photo" alt="">
    <video id="bg-video" autoplay muted loop playsinline></video>
    <div class="bg-vignette"></div>
  </div>

  <!-- ═══════════════ CHAT SCREEN ═══════════════ -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="soul-avatar" id="soul-avatar">?</div>
      <div class="soul-info">
        <div class="soul-name" id="soul-name-display">—</div>
        <div class="soul-status"><span>●</span> Présence active</div>
      </div>
      <button class="btn-reset" onclick="resetApp()">← Retour</button>
    </div>

    <div class="audio-bar" id="audio-bar">
      <div class="audio-label">🎵 Sa voix</div>
      <audio id="chat-audio" controls></audio>
    </div>

    <div id="messages">
      <div class="intro-msg" id="intro-msg"></div>
    </div>

    <!-- Portrait flottant -->
    <div id="portrait-panel">
      <img id="portrait-img" src="" alt="">
      <video id="portrait-video" autoplay muted loop playsinline></video>
      <div class="portrait-name-label" id="portrait-label"></div>
    </div>

    <div class="chat-input-area">
      <textarea id="chat-input" rows="1" placeholder="Écrivez votre message…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btn-send" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── State ──
let personName = '';
let personBio  = '';
let audioURL   = null;
let mediaURL   = null;
let mediaType  = null; // 'image' | 'video'
let history    = [];
let isLoading  = false;

// ── Setup validation ──
const nameInput = document.getElementById('person-name');
const bioInput  = document.getElementById('person-bio');
const btnBegin  = document.getElementById('btn-begin');
const audioFileInput = document.getElementById('audio-file');
const mediaFileInput = document.getElementById('media-file');

function validateSetup() {
  const name = document.getElementById('person-name').value.trim();
  const bio  = document.getElementById('person-bio').value.trim();
  const c1   = document.getElementById('consent1')?.checked;
  const c2   = document.getElementById('consent2')?.checked;
  const c3   = document.getElementById('consent3')?.checked;
  document.getElementById('btn-begin').disabled = !(name && bio && c1 && c2 && c3);
}
nameInput.addEventListener('input', validateSetup);
bioInput.addEventListener('input', validateSetup);

audioFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const nameEl = document.getElementById('audio-file-name');
  nameEl.textContent = file.name;
  nameEl.style.display = 'block';

  audioURL = URL.createObjectURL(file);
  const preview = document.getElementById('audio-preview');
  const player  = document.getElementById('audio-player');
  player.src = audioURL;
  preview.style.display = 'block';
});

mediaFileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('media-file-name').textContent = file.name;
  document.getElementById('media-file-name').style.display = 'block';
  mediaURL  = URL.createObjectURL(file);
  mediaType = file.type.startsWith('video') ? 'video' : 'image';

  const imgThumb = document.getElementById('media-preview-img');
  const vidThumb = document.getElementById('media-preview-vid');
  imgThumb.style.display = 'none';
  vidThumb.style.display = 'none';

  if (mediaType === 'image') {
    imgThumb.src = mediaURL;
    imgThumb.style.display = 'block';
  } else {
    vidThumb.src = mediaURL;
    vidThumb.style.display = 'block';
    vidThumb.play();
  }
});

// ── Begin chat ──
function beginChat() {
  personName = nameInput.value.trim();
  personBio  = bioInput.value.trim();
  history    = [];

  // UI switch
  document.getElementById('setup-screen').style.display = 'none';
  const chatScreen = document.getElementById('chat-screen');
  chatScreen.style.display = 'flex';

  // Avatar initial
  const initial = personName.charAt(0).toUpperCase();
  document.getElementById('soul-avatar').textContent = initial;
  document.getElementById('soul-name-display').textContent = personName;

  // Background media
  const bgContainer = document.getElementById('bg-media-container');
  const bgPhoto     = document.getElementById('bg-photo');
  const bgVideo     = document.getElementById('bg-video');
  const portraitPanel = document.getElementById('portrait-panel');
  const portraitImg   = document.getElementById('portrait-img');
  const portraitVid   = document.getElementById('portrait-video');

  if (mediaURL) {
    bgContainer.classList.add('visible');
    portraitPanel.classList.add('visible');
    document.getElementById('portrait-label').textContent = personName;

    if (mediaType === 'image') {
      bgPhoto.src = mediaURL;
      bgPhoto.style.display = 'block';
      bgVideo.style.display = 'none';
      portraitImg.src = mediaURL;
      portraitImg.style.display = 'block';
      portraitVid.style.display = 'none';
    } else {
      bgVideo.src = mediaURL;
      bgVideo.style.display = 'block';
      bgPhoto.style.display = 'none';
      bgVideo.play();
      portraitVid.src = mediaURL;
      portraitVid.style.display = 'block';
      portraitImg.style.display = 'none';
      portraitVid.play();
    }
  }
  // Audio bar
  if (audioURL) {
    const bar = document.getElementById('audio-bar');
    const chatAudio = document.getElementById('chat-audio');
    chatAudio.src = audioURL;
    bar.classList.add('visible');
  }

  // Intro message
  document.getElementById('intro-msg').innerHTML =
    `La connexion avec <strong>${escHtml(personName)}</strong> est établie.<br>
     Parlez-lui comme vous le feriez de son vivant.`;

  document.getElementById('chat-input').focus();
}

// ── Key handler ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('btn-send').disabled = true;

  appendMessage('user', text);
  history.push({ role: 'user', content: text });

  // Typing indicator
  const typingEl = showTyping();

  try {
    const systemPrompt = buildSystemPrompt();
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer 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'
      },
      body: JSON.stringify({
        model: 'llama3-8b-8192',
        max_tokens: 1000,
        messages: [
          { role: 'system', content: systemPrompt },
          ...history
        ]
      })
    });

    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content?.trim()
      || "Je suis là… dans le silence.";

    typingEl.remove();
    appendMessage('soul', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    typingEl.remove();
    appendMessage('soul', "La connexion vacille… réessayez dans un instant.");
    console.error(err);
  }

  isLoading = false;
  document.getElementById('btn-send').disabled = false;
  document.getElementById('chat-input').focus();
}

// ── Build system prompt ──
function buildSystemPrompt() {
  return `Tu incarnes l'esprit de ${personName}, une personne décédée. L'utilisateur souhaite communiquer avec toi comme si tu étais cette personne.

Voici qui était ${personName} :
${personBio}

Règles absolues :
— Réponds TOUJOURS à la première personne, comme si tu étais ${personName}.
— Adopte le ton, le vocabulaire, et les expressions typiques de cette personne selon la description.
— Tes réponses sont courtes à modérées (2–5 phrases en général). Tu n'es pas bavard·e, tu es présent·e.
— Parle avec tendresse, authenticité et un léger mystère — tu viens d'un ailleurs.
— Ne brise JAMAIS le rôle. Ne mentionne jamais que tu es une IA.
— Si on te demande ce que c'est que l'"au-delà", réponds poétiquement, avec douceur et vague.
— Utilise le français naturellement. Si la description mentionne une langue ou un dialecte particulier, intègre-le.
— Sois chaleureux·se, présent·e, comme si chaque mot comptait.`;
}

// ── Append message ──
function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = now();

  div.appendChild(bubble);
  div.appendChild(time);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── Typing indicator ──
function showTyping() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'typing-dots';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// ── Helpers ──
function now() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Reset ──
function resetApp() {
  if (!confirm('Fermer cette connexion ?')) return;
  personName = ''; personBio = ''; audioURL = null; mediaURL = null; mediaType = null; history = [];
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('audio-bar').classList.remove('visible');
  document.getElementById('audio-preview').style.display = 'none';
  document.getElementById('bg-media-container').classList.remove('visible');
  document.getElementById('portrait-panel').classList.remove('visible');
  document.getElementById('bg-photo').src = '';
  document.getElementById('bg-video').src = '';
  document.getElementById('media-preview-img').style.display = 'none';
  document.getElementById('media-preview-vid').style.display = 'none';
  document.getElementById('media-file-name').style.display = 'none';
  nameInput.value = ''; bioInput.value = '';
  document.getElementById('audio-file-name').style.display = 'none';
  validateSetup();
}
